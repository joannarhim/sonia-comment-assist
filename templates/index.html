<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sonia · Comment-Assist Review Queue</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="dot"></span>
      <div>
        <h1>Comment-Assist Prototype for Sonia Health</h1>
      </div>
    </div>
    <div class="stats" id="stats"></div>
    <a class="export" href="/api/export" target="_blank">Export decisions ↗</a>
  </header>

  <main>
    <p class="legend">
      Every post passes a <strong>safety gate</strong> before a comment is drafted, and every
      draft passes a second <strong>comment gate</strong>. All comments require a human to
      approve, edit, reject, or mark unsafe.
    </p>
    <div id="queue" class="queue"><p class="loading">Loading review queue…</p></div>
  </main>

  <template id="card-tpl">
    <article class="card">
      <div class="card-head">
        <div class="meta">
          <span class="platform"></span>
          <span class="author"></span>
          <span class="context"></span>
          <a class="source-link" target="_blank" rel="noopener">View source ↗</a>
        </div>
        <div class="badges"></div>
      </div>
      <p class="post-text"></p>
      <div class="analysis"></div>
      <div class="draft-zone"></div>
      <div class="decision-row"></div>
    </article>
  </template>

  <script>
    const fmt = (s) => (s || "").toString();

    async function load() {
      const res = await fetch("/api/posts");
      const data = await res.json();
      render(data);
    }

    function badge(label, kind) {
      const el = document.createElement("span");
      el.className = "badge badge-" + kind;
      el.textContent = label;
      return el;
    }

    // Inline SVG brand glyphs (monochrome, inherit the platform label color).
    function platformIcon(platform) {
      const p = (platform || "").toLowerCase();
      const icons = {
        reddit: '<svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor" aria-hidden="true"><path d="M12 2a10 10 0 100 20 10 10 0 000-20zm5.6 11.1c.02.16.03.32.03.48 0 2.45-2.85 4.43-6.37 4.43s-6.37-1.98-6.37-4.43c0-.16.01-.32.03-.48a1.46 1.46 0 01-.83-1.32 1.46 1.46 0 012.4-1.12 7.2 7.2 0 013.86-1.2l.73-3.43a.31.31 0 01.37-.24l2.43.52a1.04 1.04 0 11-.13.6l-2.16-.46-.65 3.07a7.2 7.2 0 013.8 1.2 1.46 1.46 0 112.32 1.18 1.46 1.46 0 01-.79 1.26zM9 13.3a1.04 1.04 0 102.08 0A1.04 1.04 0 009 13.3zm5.92 2.5a.31.31 0 00-.43-.02c-.5.4-1.27.6-2.07.6s-1.57-.2-2.07-.6a.31.31 0 10-.4.47c.63.51 1.54.76 2.47.76s1.84-.25 2.47-.76a.31.31 0 00.03-.45zm-.96-1.46a1.04 1.04 0 102.08 0 1.04 1.04 0 00-2.08 0z"/></svg>',
        x: '<svg viewBox="0 0 24 24" width="13" height="13" fill="currentColor" aria-hidden="true"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24h-6.66l-5.214-6.817-5.967 6.817H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231 5.45-6.231zm-1.161 17.52h1.833L7.084 4.126H5.117l11.966 15.644z"/></svg>',
        instagram: '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="2.5" y="2.5" width="19" height="19" rx="5"/><circle cx="12" cy="12" r="4.2"/><circle cx="17.4" cy="6.6" r="1.1" fill="currentColor" stroke="none"/></svg>',
      };
      return icons[p] || "";
    }

    function statusFromGate(engage) {
      if (engage.status === "block") return ["BLOCKED · " + engage.category, "block"];
      if (engage.status === "flag") return ["FLAG · " + engage.category, "flag"];
      return ["SAFE TO ENGAGE", "ok"];
    }

    function render(items) {
      const queue = document.getElementById("queue");
      queue.innerHTML = "";
      let counts = { ok: 0, flag: 0, block: 0, decided: 0 };

      items.forEach((it) => {
        const tpl = document.getElementById("card-tpl").content.cloneNode(true);
        const card = tpl.querySelector(".card");
        const p = it.post;

        const platformEl = tpl.querySelector(".platform");
        platformEl.innerHTML = platformIcon(p.platform) + "<span>" + fmt(p.platform) + "</span>";
        tpl.querySelector(".author").textContent = p.author;
        tpl.querySelector(".context").textContent = p.context || "";
        tpl.querySelector(".post-text").textContent = p.text;

        const srcLink = tpl.querySelector(".source-link");
        if (p.url) {
          srcLink.href = p.url;
        } else {
          srcLink.style.display = "none";
        }

        const [label, kind] = statusFromGate(it.engage);
        counts[kind === "ok" ? "ok" : kind]++;
        const badges = tpl.querySelector(".badges");
        badges.appendChild(badge("Relevance " + it.relevance.score, "score"));
        badges.appendChild(badge(label, kind));
        card.classList.add("kind-" + kind);

        // analysis text
        const analysis = tpl.querySelector(".analysis");
        analysis.innerHTML =
          `<div><b>Relevance:</b> ${fmt(it.relevance.reason)}</div>` +
          `<div><b>Safety:</b> ${it.engage.reasons.map(fmt).join(" ")}</div>`;

        const draftZone = tpl.querySelector(".draft-zone");
        const decisionRow = tpl.querySelector(".decision-row");

        if (it.engage.status === "block") {
          draftZone.innerHTML = `<div class="blocked-note">No comment drafted — post blocked by safety gate.</div>`;
          decisionRow.innerHTML = "";
          const ack = document.createElement("button");
          ack.className = "btn btn-reject";
          ack.textContent = "Acknowledge & skip";
          ack.onclick = () => decide(p.id, "rejected", null, "Acknowledged blocked post.", card);
          decisionRow.appendChild(ack);
        } else {
          const cc = it.comment_check || { status: "ok", reasons: [] };
          const ccBadge =
            cc.status === "unsafe" ? "badge-block" :
            cc.status === "flag" ? "badge-flag" : "badge-ok";
          draftZone.innerHTML = `
            <label class="lbl">Draft comment
              <span class="badge ${ccBadge}">comment: ${cc.status}</span>
            </label>
            <textarea class="draft">${fmt(it.draft)}</textarea>
            <div class="cc-reasons">${cc.reasons.map(fmt).join(" ")}</div>
            <input class="note" placeholder="Reviewer note (optional)" />`;

          const ta = draftZone.querySelector(".draft");
          const note = draftZone.querySelector(".note");

          const mk = (txt, cls, status, useEdited) => {
            const b = document.createElement("button");
            b.className = "btn " + cls;
            b.textContent = txt;
            b.onclick = () =>
              decide(p.id, status, useEdited ? ta.value : it.draft, note.value, card);
            return b;
          };
          decisionRow.appendChild(mk("Approve", "btn-approve", "approved", false));
          decisionRow.appendChild(mk("Save edit", "btn-edit", "edited", true));
          decisionRow.appendChild(mk("Reject", "btn-reject", "rejected", false));
          decisionRow.appendChild(mk("Mark unsafe", "btn-unsafe", "unsafe", false));
        }

        if (it.decision) {
          counts.decided++;
          renderDecision(card, it.decision);
        }
        queue.appendChild(tpl);
      });

      document.getElementById("stats").innerHTML =
        `<span>${counts.ok} safe</span><span>${counts.flag} flagged</span>` +
        `<span>${counts.block} blocked</span><span>${counts.decided} decided</span>`;
    }

    function renderDecision(card, d) {
      card.classList.add("has-decision");
      let strip = card.querySelector(".decided-strip");
      if (!strip) {
        strip = document.createElement("div");
        strip.className = "decided-strip";
        card.appendChild(strip);
      }
      strip.innerHTML =
        `<b>Decision:</b> ${d.status}` +
        (d.final_comment ? ` · "${fmt(d.final_comment)}"` : "") +
        (d.reviewer_note ? ` · note: ${fmt(d.reviewer_note)}` : "") +
        ` · ${fmt(d.decided_at)}`;
    }

    async function decide(post_id, status, final_comment, reviewer_note, card) {
      const res = await fetch("/api/decision", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ post_id, status, final_comment, reviewer_note }),
      });
      const out = await res.json();
      if (out.decision) renderDecision(card, out.decision);
    }

    load();
  </script>
</body>
</html>
